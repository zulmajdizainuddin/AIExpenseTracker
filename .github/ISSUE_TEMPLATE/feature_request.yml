name: Feature Request
description: Propose a new feature for this project
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: "## Feature Request"

  - type: input
    id: title
    attributes:
      label: Feature Title
      placeholder: "e.g., Add CSV export for expenses"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the feature? Who benefits from it?
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: What must be true for this to be complete?
      placeholder: |
        - [ ] Given ... when ... then ...
        - [ ] Given ... when ... then ...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [backend, frontend, ai, security, devops]
    validations:
      required: true
